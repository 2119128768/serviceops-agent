services:
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://serviceops:serviceops@postgres:5432/serviceops
      KB_DOCS_PATH: data/kb_docs
      SERVICEOPS_AUTO_SEED: "true"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: serviceops
      POSTGRES_PASSWORD: serviceops
      POSTGRES_DB: serviceops
    ports:
      - "5432:5432"
    volumes:
      - serviceops_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  serviceops_pg:
